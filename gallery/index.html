<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="stylesheet" href="./gallery.css" />
  <link rel="shortcut icon" href="../honey/asserts/favicon.ico" />
</head>
<body>

  <!-- header -->
  <header class="site-header">
    <nav class="nav">
      <a href="/" class="nav-logo">M.</a>
      <div class="nav-links">
        <a href="/">Home</a>
        <a href="/honey/">Honey</a>
        <a href="/gallery/" class="active">Gallery</a>
      </div>
    </nav>
    <div class="hero">
      <p class="hero-kicker">Photography</p>
      <h1 class="hero-title">Frames &amp; Fragments</h1>
      <p class="hero-sub">moments caught between blinks</p>
    </div>
  </header>

  <!-- filter bar -->
  <div class="filter-bar">
    <button class="filter-btn active" data-tag="all">All</button>
    <button class="filter-btn" data-tag="flora">Flora</button>
    <button class="filter-btn" data-tag="landscape">Landscape</button>
    <button class="filter-btn" data-tag="night">Night</button>
    <button class="filter-btn" data-tag="urban">Urban</button>
  </div>

  <!-- gallery grid -->
  <main class="gallery" id="gallery"></main>

  <!-- lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lb-close" aria-label="Close">&times;</button>
    <button class="lb-arrow lb-prev" aria-label="Previous">&#8249;</button>
    <button class="lb-arrow lb-next" aria-label="Next">&#8250;</button>
    <figure class="lb-stage">
      <img class="lb-img" id="lb-img" src="" alt="" />
      <figcaption class="lb-caption" id="lb-caption"></figcaption>
    </figure>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <footer class="site-footer">
    <p>&copy; 2025 Mejistus</p>
  </footer>

  <script src="./gallery.js"></script>
</body>
</html>
