<!doctype html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery — Xu Chen</title>
  <link rel="stylesheet" href="./gallery.css" />
  <link rel="shortcut icon" href="../honey/asserts/favicon.ico" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
</head>
<body>

  <nav>
    <a href="/" class="nav-logo">Xu Chen</a>
    <ul class="nav-links">
      <li><a href="/#about">About</a></li>
      <li><a href="/#posts">Blog</a></li>
      <li><a href="/gallery/" class="active">Gallery</a></li>
      <li><a href="/#contact">Contact</a></li>
    </ul>
  </nav>

  <header class="hero">
    <p class="hero-tag">Photography</p>
    <h1 class="hero-title">Frames <em>&amp;</em> Fragments</h1>
    <p class="hero-sub">moments caught between blinks</p>
  </header>

  <section class="gallery-section">
    <div class="filter-bar">
      <button class="filter-btn active" data-tag="all">All</button>
      <button class="filter-btn" data-tag="flora">Flora</button>
      <button class="filter-btn" data-tag="landscape">Landscape</button>
      <button class="filter-btn" data-tag="night">Night</button>
      <button class="filter-btn" data-tag="urban">Urban</button>
    </div>
    <div class="gallery" id="gallery"></div>
  </section>

  <!-- lightbox -->
  <div class="lb-overlay" id="lb-overlay"></div>
  <div class="lightbox" id="lightbox">
    <button class="lb-close" aria-label="Close">&times;</button>
    <button class="lb-arrow lb-prev" aria-label="Previous">&#8249;</button>
    <button class="lb-arrow lb-next" aria-label="Next">&#8250;</button>
    <figure class="lb-stage">
      <img class="lb-img" id="lb-img" src="" alt="" />
      <figcaption class="lb-caption" id="lb-caption"></figcaption>
    </figure>
    <div class="lb-counter" id="lb-counter"></div>
  </div>

  <footer>
    <p>&copy; 2025 Xu Chen</p>
  </footer>

  <script src="./gallery.js"></script>
</body>
</html>
